spring:
  application:
    name: praxis-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/praxis_db}
    username: ${DB_USER:praxis_user}
    password: ${DB_PASSWORD:ax8EHjuZU56aerhsfseDbpssdpr}
  jpa:
    # Flyway owns the schema; Hibernate only verifies the entities match it.
    # (With `update` here, Hibernate was silently creating the schema whenever
    # Flyway didn't run — masking migration problems instead of surfacing them.)
    hibernate.ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  autoconfigure:
    # No UserDetailsService is defined (auth is JWT + BCrypt in AuthService), so
    # Boot would otherwise create an unused in-memory user and log a generated
    # password on every start.
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Redis is used via templates (streams + pub/sub), never as a Spring Data
      # repository store — this stops Redis from scanning the 8 JPA repositories.
      repositories:
        enabled: false
  servlet:
    multipart:
      # Container-level cap for POST /analyses/upload — matches
      # praxis.intake.max-total-size-mb so oversized uploads are rejected
      # before they ever reach application code.
      max-file-size: 200MB
      max-request-size: 210MB


server:
  port: 8145

management:
  endpoints:
    web:
      exposure:
        include: health,info

praxis:
  jwt:
    secret: ${JWT_SECRET:db826a2d080f0dc788d55208b8a7aadcada1243c5d844c7eefe1837578bfb361}
    ttl-minutes: 60
  analysis:
    risk-threshold: 60
    max-repo-size-mb: 200
    max-files: 5000
  intake:
    workspace-root: ${INTAKE_WORKSPACE_ROOT:/tmp/praxis-workspaces}
    max-files: 5000
    max-total-size-mb: 200
    max-file-size-mb: 2
    clone-timeout-seconds: 120
    max-compression-ratio: 120
    allowed-upload-extensions: zip   # add e.g. tar.gz here once a fetcher for it exists
    upload-retention-hours: 24       # staged uploads older than this are janitored away
  prism:
    high-complexity: 10        # methods at/above this cyclomatic complexity are flagged
    long-method-loc: 60        # methods longer than this many lines are flagged
    god-object-methods: 20     # classes with more methods than this are flagged
    god-object-loc: 400        # classes longer than this many lines are flagged
  cortex:
    provider: ${CORTEX_PROVIDER:ollama}   # stub (offline, no keys) | ollama | openai | gemini
    prompt-version: v1
    temperature: 0.2
    ollama:                              # local models — no key, no per-token cost
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5-coder:7b}   # strong open code model; use :32b or deepseek-coder-v2 if the box allows
      timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:300}   # 7B on CPU is slow + first call loads the model; lower on GPU
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o}      # gpt-4o-mini for lower cost
      timeout-seconds: 60
    gemini:
      base-url: https://generativelanguage.googleapis.com/v1beta
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}     # gemini-1.5-flash for speed/cost; newer models are drop-in
      timeout-seconds: 60
# --- Logging -------------------------------------------------------------
# com.praxis at DEBUG traces the full business flow. Every flow log carries the
# analysisId, so in Splunk you can follow one analysis across the request thread,
# the Redis worker thread, and every pipeline stage by filtering on that id.
# Drop com.praxis to INFO in production if DEBUG is too chatty.
logging:
  level:
    com.praxis: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
