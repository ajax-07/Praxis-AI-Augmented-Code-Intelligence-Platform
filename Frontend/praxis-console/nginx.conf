server {
    listen 80;
    client_max_body_size 210M;   # match the backend's multipart cap

    # SPA: any non-file route falls back to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Same-origin API: the app always calls /api/... — nginx forwards to the
    # backend service (compose network name "backend", port 8145).
    location /api/ {
        proxy_pass http://backend:8145;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE (/events) needs buffering off so progress frames flush instantly.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;   # match the backend's 30-min SSE emitter timeout
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
