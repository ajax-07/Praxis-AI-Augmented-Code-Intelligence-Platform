services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: praxis-pgdb
    restart: unless-stopped
    environment: { POSTGRES_DB: praxis_db, POSTGRES_USER: praxis_user, POSTGRES_PASSWORD: ax8EHjuZU56aerhsfseDbpssdpr }
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis_user -d praxis_db"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: praxis-redis
    ports:
      - "6379:6379"  
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # backend:
  #   build: { context: .., dockerfile: docker/backend.Dockerfile }
  #   environment:
  #     DB_URL: jdbc:postgresql://postgres:5432/praxis   # service name, not localhost!
  #     DB_USER: praxis
  #     DB_PASSWORD: praxis123
  #     REDIS_HOST: redis
  #     JWT_SECRET: ${JWT_SECRET}
  #     LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  #     OLLAMA_URL: http://ollama:11434
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     redis:    { condition: service_healthy }
  #   ports: [ "8145:8145" ]

  # frontend:
  #   build: { context: .., dockerfile: docker/frontend.Dockerfile }
  #   depends_on: [ backend ]
  #   ports: [ "3000:80" ]

  ollama:                       # optional local AI
    image: ollama/ollama
    container_name: parxis-ollama
    ports: [ "11434:11434" ]    # host-run backend reaches it at localhost:11434
    volumes: [ "ollama:/root/.ollama" ]

volumes: { pgdata: {}, redis_data: {}, ollama: {} }
